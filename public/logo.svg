<svg width="240" height="240" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
<linearGradient id="mesh_positional_grad" x1="12" y1="50" x2="88" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>   
      <stop offset="35%" stop-color="#4f46e5"/>  
      <stop offset="65%" stop-color="#9a3412"/>  
      <stop offset="100%" stop-color="#ea580c"/> 
      </linearGradient>
